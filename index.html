<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body { height: 100%; margin: 0; }
#map { height: 100%; width: 100%; }

.panel {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 9999;
  width: 360px;
  padding: 15px;
  background: white;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  font-family: Arial;
}

.btn {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #0057B8;
  color: white;
  width: 100%;
  margin-top: 8px;
  cursor: pointer;
}

.count {
  margin-top: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <b>selection centres</b><br><br>

  <input id="fileName" placeholder="nom fichier"/>

  <button class="btn" id="exportBtn">export csv</button>

  <div class="count" id="countBox">0 sélectionné(s)</div>

  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

// =============================
// IMPORTANT : tes données ici
// =============================
const pts = [
  {lat:19.47, lon:-72.62, dep:"ARTIBONITE", com:"GONAIVES", sec:"1", tip:"centre A"},
  {lat:19.48, lon:-72.63, dep:"ARTIBONITE", com:"GONAIVES", sec:"1", tip:"centre B"}
];

// =============================
// carte
// =============================
const map = L.map('map').setView([19.45, -72.6], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OSM'
}).addTo(map);

// cluster
const cluster = L.markerClusterGroup();
map.addLayer(cluster);

// =============================
// selection
// =============================
let selected = [];

function updateUI(){
  document.getElementById("countBox").innerHTML = selected.length + " sélectionné(s)";

  document.getElementById("list").innerHTML =
    selected.map(p => p.tip).join("<br>");
}

// icons
const normalIcon = L.icon({
  iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
  iconSize: [25,41],
  iconAnchor: [12,41]
});

const selectedIcon = L.icon({
  iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
  iconSize: [25,41],
  iconAnchor: [12,41]
});

// =============================
// markers
// =============================
pts.forEach(p => {

  const m = L.marker([p.lat, p.lon], {icon: normalIcon});

  m.bindPopup(p.tip);

  m.on("click", () => {

    const index = selected.findIndex(x => x.lat === p.lat && x.lon === p.lon);

    if(index === -1){
      selected.push(p);
      m.setIcon(selectedIcon);
    } else {
      selected.splice(index,1);
      m.setIcon(normalIcon);
    }

    updateUI();
  });

  cluster.addLayer(m);
});

// =============================
// export csv
// =============================
document.getElementById("exportBtn").onclick = () => {

  if(selected.length === 0){
    alert("aucun centre");
    return;
  }

  let csv = "departement,commune,section,nom,lat,lon\n";

  selected.forEach(p => {
    csv += `${p.dep},${p.com},${p.sec},${p.tip},${p.lat},${p.lon}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;

  let name = document.getElementById("fileName").value || "centres";
  a.download = name + ".csv";

  a.click();
};

</script>
</body>
</html>
